# First off, lets make sure we're rendering on the right GPU for _most_ things. Note, laptop's HDMI will always go down some f'd up render path
env = AQ_DRM_DEVICES,/dev/dri/card1:/dev/dri/card0

# Try and get gtk to play ball
exec = gsettings set org.gnome.desktop.interface gtk-theme "Tokyonight-Dark"   # for GTK3 apps
exec = gsettings set org.gnome.desktop.interface color-scheme "prefer-dark"   # for GTK4 apps

# Make sure our plugins are ready for prime-time!
exec-once = hyprpm reload -n

# Try a cursor theme
exec-once = gsettings set org.gnome.desktop.interface cursor-theme BreezeX-RosePine-Linux
exec-once = gsettings set org.gnome.desktop.interface cursor-size 24
env = HYPRCURSOR_THEME,rose-pine-hyprcursor
env = HYPRCURSOR_SIZE,24
env = XCURSOR_SIZE,24

# Experimental XWayalnd replacement, as triggering a crash in hyprland's xwayland interface crashes the whole thing
exec-once = xwayland-satellite :69
env = DISPLAY,:69

#### HOME SETUP ####
# Now manually configure monitors (start with main one)
monitor= desc:Samsung Electric Company C27HG7x HTNK700263, 2560x1440@144, 0x0, 1
# Strange refresh rate forces RGB full range (doesn't think it's a TV to work around RGB range issues)
monitor= desc:Dell Inc. DELL P2317H HH77Y78JAEAB, 1920x1080@58, -1920x90, 1
monitor= desc:Dell Inc. DELL P2317H HH77Y78JAE0B, 1920x1080@58, 2560x90, 1

#### OFFICE SETUP ####
monitor=desc:Dell Inc. DELL P3424WE FG8Z5T3,preferred,0x0,1
monitor=desc:Dell Inc. DELL U2722D 78Y9W83,preferred,3440x-265,1,transform,3

# The gross TV I sometimes have to connect to
monitor=desc:Samsung Electric Company SAMSUNG 0x01000E00, 1920x1080@60, auto, 1

# Workaround for issues with lockscreen crashing
monitor=FALLBACK,1920x1080@60,auto,1

# Make sure the built-in monitor gets some love too else it scales strangely
monitor=eDP-1, 2560x1600@240, auto, 1

# trigger when the switch is turning off
bindl = , switch:off:Lid Switch,exec,hyprctl keyword monitor "eDP-1, 2560x1600@240, auto, 1"
# trigger when the switch is turning on
bindl = , switch:on:Lid Switch,exec,hyprctl keyword monitor "eDP-1, disable"

# Execute your favorite apps at launch
exec-once = waybar # loads the top bar in
exec-once = nm-applet --indicator # Applet for networkmanager that hides in the collapsible tray
exec-once = hyprpaper # Wallpaper app
exec-once = swaync # Handles desktop notifications
exec-once = solaar --window=hide # Mouse manager
exec-once = hypridle # Handles system idle (and interacts with waybar inhibit)
exec-once = ~/miniforge3/bin/pypr # Some extra little plugins via python and IPC
exec-once = blueman-applet # Bluetooth manager. Useful (ish) for pairing to stuff
exec-once = systemctl --user start hyprpolkitagent # Lets GUI things request sudo
exec-once = vicinae server

# Variables for various common apps I use
$terminal = ghostty
$fileManager = nautilus
$menu = vicinae toggle

# Some default env vars, somewhat nvidia focussed
env = QT_QPA_PLATFORMTHEME,qt6ct
env = GTK_THEME, Tokyonight-Dark
env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = HYPRSHOT_DIR,Pictures/screenshots
env = ELECTRON_OZONE_PLATFORM_HINT,auto

# For all categories, see https://wiki.hyprland.org/Configuring/Variables/
input {
    kb_layout = gb
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1
    accel_profile = flat
    natural_scroll = true
    sensitivity = 0.15 # -1.0 to 1.0, 0 means no modification.

    touchpad {
        natural_scroll = yes
    }
}

# As my hhkb is US layout, use that specifically here, as we don't want to mess with A) laptops internal keyboard or B) some random keyboard I pull out of a box
device {
    name = hhkb-hybrid_1-keyboard
    kb_layout = us
}

# Let's do something slightly different for the internal trackpad
device {
    name = asuf1205:00-2808:0106-touchpad
    accel_profile = adaptive
    sensitivity = 0
    natural_scroll = true
}

general {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    gaps_in = 2
    gaps_out = 2
    border_size = 1
    # Note, this uses CSS' 8-digit format. See https://www.w3.org/TR/css-color-4/#hex-notation
    col.active_border = rgba(0DB9D7ff)
    col.inactive_border = rgba(595959aa)

    layout = dwindle

    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false
}

decoration {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    rounding = 10
    active_opacity = 1.0
    inactive_opacity = 1.0

    blur {
        enabled = true
        size = 12
        passes = 4
        ignore_opacity=true
        brightness = 0.65
        vibrancy = 0.9696
        noise = 0.02
    }

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }
}

# TODO: Fix vicinae slide
animations {
    enabled = true
    bezier = linear, 0, 0, 1, 1
    bezier = md3_standard, 0.2, 0, 0, 1
    bezier = md3_decel, 0.05, 0.7, 0.1, 1
    bezier = md3_accel, 0.3, 0, 0.8, 0.15
    bezier = overshot, 0.05, 0.9, 0.1, 1.1
    bezier = crazyshot, 0.1, 1.5, 0.76, 0.92
    bezier = hyprnostretch, 0.05, 0.9, 0.1, 1.0
    bezier = fluent_decel, 0.1, 1, 0, 1
    bezier = easeInOutCirc, 0.85, 0, 0.15, 1
    bezier = easeOutCirc, 0, 0.55, 0.45, 1
    bezier = easeOutExpo, 0.16, 1, 0.3, 1
    animation = windows, 1, 3, md3_decel, popin 60%
    animation = border, 1, 10, default
    animation = fade, 1, 2.5, md3_decel
    animation = workspaces, 1, 3.5, easeOutExpo, slide
    # animation = specialWorkspace, 1, 3, md3_decel, slidevert

    animation = layers, 1, 3.81, easeOutExpo
    animation = layersIn, 1, 4, easeOutExpo, slide
    animation = layersOut, 1, 4, easeOutExpo, slide
}

# Handle my launcher-of-choice differently, just so we can get the blur working properly
layerrule {
    name = vicinae-blur
    blur = on
    ignore_alpha = 0
    match:namespace = vicinae
}

# waybar and wofi. wofi is used for some helper functions (window finding, shutdown etc)
layerrule = blur on, ignore_alpha 0, match:namespace waybar
layerrule = blur on, ignore_alpha 0, match:namespace wofi

# Prevent animation on the area selection fade-out provided by slurp, as used in screenshotting scripts
layerrule = no_anim on, match:namespace selection

# Some animations for a more 'native' feeling swaync (if it's in-use)
layerrule = animation slide right easeInOutCubic, match:namespace swaync-notification-Window
layerrule = animation slide right easeInOutCubic, match:namespace swaync-control-center


dwindle {
    # See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
    pseudotile = yes # master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = yes # you probably want this
}

scrolling {
    fullscreen_on_one_column = true
    focus_fit_method = 0
    column_width = 0.985
    follow_focus = 1
    explicit_column_widths = 0.3, 0.5, 0.65, 0.8, 0.985, 1.0
    follow_min_visible = 0.1
}

master {
    # See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
    new_status=master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}

# On a laptop, this lets workspaces feel a bit more natural
gesture = 3, horizontal, workspace

# Experimental scrolling layout in the special workspace
workspace = s[true], layout:scrolling

# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
windowrule = suppress_event maximize, match:class .* # You'll probably like this.
windowrule = border_color rgb(ff9e64), match:fullscreen 1
windowrule = float on, match:class ^(org.gnome.Calculator)$

# Lets a window 'float' above workspaces. Useful to have a HUD of a certain window, or to just carry it around
bindd = SUPER, O, Pop window out (float & pin), exec, ~/.config/hypr/scripts/window_pop.sh

# See https://wiki.hyprland.org/Configuring/Keywords/ for more
$mainMod = SUPER

# Example special workspace (scratchpad)
bind = $mainMod ALT, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Add in the function keys
bind = , XF86MonBrightnessUp, exec, light -A 5 #TODO: Replace light
bind = , XF86MonBrightnessDown, exec, light -U 5
bind = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 5%+
bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# Custom binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, C, killactive,
bind = $mainMod SHIFT, Q, exit, # this kills the hyprland
bind = $mainMod, N, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, space, exec, $menu
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, layoutmsg, togglesplit
bind = $mainMod, K, layoutmsg, swapsplit
bind = $mainMod, F, exec, hyprctl dispatch fullscreenstate 1,
bind = $mainMod, escape, exec, hyprctl --instance 0 'dispatch exec hyprlock'
bind = $mainMod, A, exec, /usr/bin/hyprshot -m region
bind = $mainMod, S, exec, /usr/bin/hyprshot -m output
bind = $mainMod, B, exec, flatpak run app.zen_browser.zen
bind = $mainMod, W, exec, ~/miniforge3/bin/pypr fetch_client_menu # Helps if I loose windows
bind = $mainMod ALT, space, exec, ~/.config/wofi/scripts/wofipowermenu.py
bind = $mainMod, T, toggleGroup

bind = $mainMod ALT, right, changegroupactive, f
bind = $mainMod ALT, left, changegroupactive, b
bind = $mainMod ALT, P, layoutmsg, promote

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Moving windows between monitors
bind = $mainMod SHIFT, right, movewindow, mon:r
bind = $mainMod SHIFT, left, movewindow, mon:l

